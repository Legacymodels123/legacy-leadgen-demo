<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Legacy Scale Models — Lead Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Audiowide&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E30609;
    --red-dark: #b80508;
    --black: #0a0a0a;
    --black2: #151515;
    --black3: #1e1e1e;
    --gray: #DCDEDE;
    --gray2: #f4f4f4;
    --gray3: #e8e8e8;
    --text: #111111;
    --muted: #888;
    --border: #e5e5e5;
    --sidebar-w: 220px;
    --panel-w: 380px;
  }

  body { font-family: 'Montserrat', sans-serif; background: var(--gray2); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w); flex-shrink: 0;
    background: var(--black); display: flex; flex-direction: column;
    border-right: 1px solid #222;
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid #222;
  }
  .logo-mark {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px; background: var(--red);
    clip-path: polygon(0 0, 80% 0, 100% 20%, 100% 100%, 20% 100%, 0 80%);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon span { color: #fff; font-weight: 800; font-size: 16px; }
  .logo-text { display: flex; flex-direction: column; }
  .logo-name { color: #fff; font-weight: 800; font-size: 13px; letter-spacing: 0.02em; line-height: 1.2; }
  .logo-sub { font-family: 'Audiowide', sans-serif; color: var(--red); font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }

  .sidebar-section { padding: 16px 12px 8px; }
  .sidebar-label { font-family: 'Audiowide', sans-serif; font-size: 8px; color: #444; letter-spacing: 0.14em; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 6px; cursor: pointer;
    color: #777; font-size: 13px; font-weight: 500;
    transition: all .15s; margin-bottom: 2px;
  }
  .nav-item:hover { background: #1a1a1a; color: #ccc; }
  .nav-item.active { background: #1e0002; color: #fff; }
  .nav-item.active .nav-dot { background: var(--red); }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: #333; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto; background: var(--red); color: #fff;
    font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
  }

  .sidebar-bottom {
    margin-top: auto; padding: 16px; border-top: 1px solid #1e1e1e;
  }
  .user-pill {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; background: #161616;
  }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--red); color: #fff;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .user-info { min-width: 0; }
  .user-name { color: #eee; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { color: #555; font-size: 10px; }

  /* ── MAIN ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── TOPBAR ── */
  .topbar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .topbar-title { font-weight: 800; font-size: 15px; color: var(--text); }
  .topbar-sub { font-size: 12px; color: var(--muted); margin-left: 4px; }
  .topbar-spacer { flex: 1; }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--gray2); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px; width: 220px;
  }
  .search-box input {
    border: none; background: transparent; font-family: 'Montserrat', sans-serif;
    font-size: 12px; color: var(--text); outline: none; width: 100%;
  }
  .search-icon { color: #bbb; font-size: 14px; flex-shrink: 0; }
  .btn-primary {
    background: var(--red); color: #fff; border: none; cursor: pointer;
    font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 12px;
    padding: 8px 16px; border-radius: 7px; letter-spacing: 0.02em;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--red-dark); }

  /* ── CONTENT ── */
  .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* ── STATS BAR ── */
  .stats-bar {
    padding: 16px 24px;
    display: flex; gap: 12px; align-items: stretch; flex-shrink: 0;
  }
  .stat-card {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; flex: 1;
  }
  .stat-label { font-family: 'Audiowide', sans-serif; font-size: 8px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-value { font-weight: 800; font-size: 22px; color: var(--text); line-height: 1; }
  .stat-value.red { color: var(--red); }
  .stat-value.green { color: #16a34a; }
  .stat-value.orange { color: #ea580c; }
  .stat-delta { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Funnel */
  .funnel-card {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; flex: 2.2;
  }
  .funnel-label { font-family: 'Audiowide', sans-serif; font-size: 8px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .funnel-stages { display: flex; align-items: flex-end; gap: 3px; height: 36px; }
  .funnel-stage { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
  .funnel-bar { width: 100%; background: var(--gray3); border-radius: 3px; transition: height .3s; }
  .funnel-bar.s1 { background: #3b82f6; }
  .funnel-bar.s2 { background: #a855f7; }
  .funnel-bar.s3 { background: #f97316; }
  .funnel-bar.s4 { background: #22c55e; }
  .funnel-bar.s5 { background: var(--red); }
  .funnel-stage-label { font-size: 9px; color: var(--muted); white-space: nowrap; margin-top: 4px; }
  .funnel-stage-num { font-size: 11px; font-weight: 700; color: var(--text); }

  /* ── BATCH BANNER ── */
  .batch-banner {
    margin: 0 24px 12px;
    background: #0a0a0a;
    border-radius: 10px;
    padding: 12px 18px;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .batch-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .batch-text { font-size: 12px; color: #ccc; }
  .batch-text strong { color: #fff; font-weight: 700; }
  .batch-count {
    margin-left: auto; background: var(--red); color: #fff;
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 0 24px 12px;
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
  }
  .filter-pill {
    padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: #fff; color: var(--muted);
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .filter-pill:hover { border-color: var(--red); color: var(--red); }
  .filter-pill.active { background: var(--red); color: #fff; border-color: var(--red); }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  /* ── TABLE AREA ── */
  .table-area {
    flex: 1; overflow-y: auto; padding: 0 24px 24px;
    display: flex; gap: 16px;
  }
  .table-wrap { flex: 1; min-width: 0; }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #fff; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 2; }
  th {
    text-align: left; padding: 10px 14px;
    font-family: 'Audiowide', sans-serif; font-size: 8px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap;
    background: #fff;
  }
  tbody tr {
    background: #fff; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .1s;
  }
  tbody tr:hover { background: #fafafa; }
  tbody tr.selected { background: #fff5f5; border-left: 3px solid var(--red); }
  td { padding: 11px 14px; vertical-align: middle; }

  .company-cell { display: flex; align-items: center; gap: 10px; }
  .company-flag { font-size: 18px; line-height: 1; flex-shrink: 0; }
  .company-name { font-weight: 700; font-size: 13px; color: var(--text); }
  .company-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .contact-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .contact-title { font-size: 11px; color: var(--muted); }

  .score-wrap { display: flex; align-items: center; gap: 6px; }
  .score-bar-bg { width: 40px; height: 4px; background: var(--gray3); border-radius: 2px; overflow: hidden; }
  .score-bar { height: 100%; border-radius: 2px; }
  .score-num { font-size: 12px; font-weight: 700; }

  .status-pill {
    display: inline-flex; padding: 3px 8px; border-radius: 12px;
    font-size: 10px; font-weight: 700; white-space: nowrap;
  }
  .s-nieuw { background: #eff6ff; color: #1d4ed8; }
  .s-bekeken { background: #fefce8; color: #92400e; }
  .s-verstuurd { background: #f5f3ff; color: #6d28d9; }
  .s-opvolgen { background: #fff7ed; color: #c2410c; }
  .s-gewonnen { background: #f0fdf4; color: #15803d; }
  .s-verloren { background: #fef2f2; color: #b91c1c; }

  .actions-cell { display: flex; gap: 5px; align-items: center; }
  .action-btn {
    padding: 4px 8px; border-radius: 5px; border: 1px solid var(--border);
    background: #fff; font-size: 10px; font-weight: 600; cursor: pointer;
    color: var(--muted); transition: all .15s; white-space: nowrap;
    font-family: 'Montserrat', sans-serif;
  }
  .action-btn:hover { border-color: var(--red); color: var(--red); background: #fff5f5; }
  .action-btn.linkedin { color: #0077b5; border-color: #0077b5; }
  .action-btn.linkedin:hover { background: #f0f8ff; }

  .batch-badge {
    font-size: 9px; padding: 2px 6px; border-radius: 4px;
    background: #0a0a0a; color: #888; font-weight: 600;
  }
  .batch-badge.new-batch { background: var(--red); color: #fff; }

  /* ── SIDE PANEL ── */
  .side-panel {
    width: var(--panel-w); flex-shrink: 0;
    background: #fff; border-radius: 12px;
    border: 1px solid var(--border);
    overflow-y: auto; overflow-x: hidden;
    display: none;
    align-self: flex-start;
    position: sticky; top: 0;
    max-height: calc(100vh - 220px);
  }
  .side-panel.open { display: block; }

  .panel-header {
    background: var(--black); padding: 20px;
    position: relative; overflow: hidden;
  }
  /* diagonal accent */
  .panel-header::after {
    content: '';
    position: absolute; top: -20px; right: -30px;
    width: 80px; height: 120px;
    background: var(--red);
    transform: skewX(-12deg);
    opacity: .7;
  }
  .panel-close {
    position: absolute; top: 12px; right: 12px; z-index: 2;
    background: rgba(255,255,255,.1); border: none; color: #fff;
    width: 24px; height: 24px; border-radius: 50%;
    font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .panel-flag { font-size: 28px; line-height: 1; position: relative; z-index: 1; }
  .panel-company { font-weight: 800; font-size: 16px; color: #fff; margin-top: 6px; position: relative; z-index: 1; }
  .panel-sector { font-family: 'Audiowide', sans-serif; font-size: 8px; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; position: relative; z-index: 1; }

  .panel-body { padding: 16px; }

  .panel-score-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--gray2); border-radius: 8px; padding: 10px 14px; margin-bottom: 14px;
  }
  .panel-score-label { font-size: 11px; color: var(--muted); }
  .panel-score-value { font-size: 20px; font-weight: 800; }

  .panel-section { margin-bottom: 14px; }
  .panel-section-title {
    font-family: 'Audiowide', sans-serif; font-size: 8px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .panel-kv { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .panel-k { font-size: 11px; color: var(--muted); }
  .panel-v { font-size: 12px; font-weight: 600; color: var(--text); }

  .contact-card {
    background: var(--gray2); border-radius: 8px; padding: 12px;
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .contact-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--black); color: #fff;
    font-size: 13px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .contact-card-name { font-size: 13px; font-weight: 700; }
  .contact-card-title { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .linkedin-link {
    margin-left: auto; display: flex; align-items: center; gap: 4px;
    font-size: 11px; color: #0077b5; text-decoration: none; font-weight: 600;
    padding: 4px 8px; border-radius: 5px; border: 1px solid #0077b5;
    white-space: nowrap;
  }
  .linkedin-link:hover { background: #f0f8ff; }

  .message-box {
    background: var(--gray2); border-radius: 8px; padding: 12px;
    font-size: 12px; color: #444; line-height: 1.6; max-height: 180px; overflow-y: auto;
  }

  .copy-btn {
    width: 100%; margin-top: 8px;
    background: var(--red); color: #fff; border: none; cursor: pointer;
    font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 12px;
    padding: 9px; border-radius: 7px; transition: background .15s;
    letter-spacing: 0.02em;
  }
  .copy-btn:hover { background: var(--red-dark); }

  .status-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
  .status-btn {
    padding: 6px 4px; border-radius: 6px; border: 1px solid var(--border);
    background: #fff; font-size: 10px; font-weight: 600; cursor: pointer;
    color: var(--muted); transition: all .15s; font-family: 'Montserrat', sans-serif;
    text-align: center;
  }
  .status-btn:hover { border-color: var(--red); color: var(--red); }
  .status-btn.active-s { background: var(--red); color: #fff; border-color: var(--red); }

  .notes-input {
    width: 100%; border: 1px solid var(--border); border-radius: 7px;
    padding: 8px 10px; font-family: 'Montserrat', sans-serif; font-size: 12px;
    color: var(--text); resize: vertical; min-height: 60px; outline: none;
    transition: border-color .15s;
  }
  .notes-input:focus { border-color: var(--red); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
</style>
</head>

// Fit score: based on employees + sector match
function fitScore(p) {
  let s = 50
  if (p.employees >= 1000) s += 30
  else if (p.employees >= 500) s += 25
  else if (p.employees >= 200) s += 18
  else if (p.employees >= 100) s += 10
  if (['Agri Machinery','Agri Importer','Agri Dealer','Agri Manufacturer'].includes(p.sector)) s += 15
  else if (p.sector === 'Agri Trading') s += 10
  if (p.country === 'Nederland') s += 5
  return Math.min(s, 99)
}

prospects.forEach(p => p.score = fitScore(p))

function copyMsg(id) {
  const p = prospects.find(x => x.id === id)
  if (!p) return
  navigator.clipboard.writeText(p.message)
  const btn = document.getElementById('copyBtnPanel')
  if (btn) { btn.textContent = '✓ Gekopieerd!'; setTimeout(()=>{ btn.textContent = 'Kopieer bericht' }, 2000) }
}

function setStatus(id, status) {
  const p = prospects.find(x => x.id === id)
  if (p) { p.status = status; render() }
}

function setNotes(id, notes) {
  const p = prospects.find(x => x.id === id)
  if (p) p.notes = notes
}

<div id="app"></div>
<script>render()</script>
